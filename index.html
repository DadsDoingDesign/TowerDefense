<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#09090f">
  <title>SENTINEL — Perimeter Defense Console</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">

    <!-- Site header — brand identity -->
    <header id="site-header">
      <div id="header-brand">
        <div id="header-logo" aria-hidden="true"></div>
        <div id="header-wordmark">
          <span id="header-title">SENTINEL</span>
          <span id="header-subtitle">Perimeter Defense Console</span>
        </div>
      </div>
      <div id="header-meta">
        <div id="header-status">
          <span class="status-dot" aria-hidden="true"></span>
          <span>OPERATIONAL</span>
        </div>
        <span id="header-version">v2.4.1</span>
      </div>
    </header>

    <!-- Canvas layer -->
    <div id="canvas-container">
      <canvas id="bg-canvas"></canvas>
      <canvas id="game-canvas"></canvas>

      <!-- Floating toast notification -->
      <div id="toast" class="toast" aria-live="polite"></div>
    </div>

    <!-- HUD bar -->
    <div id="ui-bar">
      <div id="stats-row">
        <div class="stat" id="stat-gold">
          <span class="stat-value"><span class="stat-icon gold-icon">◆</span><span id="gold-value">150</span></span>
          <span class="stat-label">Credits</span>
        </div>
        <div class="stat" id="stat-lives">
          <span class="stat-value"><span class="stat-icon lives-icon">♥</span><span id="lives-value">20</span></span>
          <span class="stat-label">Nodes</span>
        </div>
        <div class="stat" id="stat-wave">
          <span class="stat-value">#<span id="wave-value">—</span></span>
          <span class="stat-label">Wave</span>
        </div>
        <div class="stat" id="stat-score">
          <span class="stat-value mono" id="score-value">0</span>
          <span class="stat-label">Score</span>
        </div>
        <div class="stats-spacer"></div>
        <button id="speed-btn" class="speed-btn" title="Toggle game speed" aria-label="Speed: 1×">1×</button>
      </div>

      <!-- Wave preview -->
      <div id="wave-preview-row" class="wave-preview-row hidden">
        <span class="wave-preview-label">Inbound</span>
        <span id="wave-preview-text" class="wave-preview-text"></span>
      </div>

      <div id="tower-strip">
        <button class="tower-btn" data-tower="meta">
          <span class="tower-icon" data-tower="meta">
            <!-- Meta infinity loop -->
            <svg viewBox="0 0 60 30" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="17" cy="15" rx="13.5" ry="9" stroke="currentColor" stroke-width="5.5"/>
              <ellipse cx="43" cy="15" rx="13.5" ry="9" stroke="currentColor" stroke-width="5.5"/>
            </svg>
          </span>
          <span class="tower-name">Meta</span>
          <span class="tower-cost mono">50 cr</span>
        </button>
        <button class="tower-btn" data-tower="amazon">
          <span class="tower-icon" data-tower="amazon">
            <!-- Amazon a + smile arrow -->
            <svg viewBox="0 0 80 90" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M60 43 L60 18 Q58 6 47 6 Q33 6 33 21 Q33 32 52 37 L60 40" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M33 50 Q33 58 47 58 Q62 58 62 47" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
              <path d="M15 75 Q40 90 65 75" stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
              <path d="M59 68 L68 75 L59 82" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="tower-name">Amazon</span>
          <span class="tower-cost mono">100 cr</span>
        </button>
        <button class="tower-btn" data-tower="uber">
          <span class="tower-icon" data-tower="uber">
            <!-- Uber bold U -->
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 12 L18 60 Q18 90 50 90 Q82 90 82 60 L82 12" stroke="currentColor" stroke-width="16" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="tower-name">Uber</span>
          <span class="tower-cost mono">75 cr</span>
        </button>
        <button class="tower-btn" data-tower="tesla">
          <span class="tower-icon" data-tower="tesla">
            <!-- Tesla T with curved top connectors -->
            <svg viewBox="0 0 100 110" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 25 Q30 5 50 8 Q70 5 95 25" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
              <path d="M27 25 Q38 13 50 17 Q62 13 73 25" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
              <line x1="50" y1="17" x2="50" y2="105" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="tower-name">Tesla</span>
          <span class="tower-cost mono">150 cr</span>
        </button>

        <div class="strip-spacer"></div>

        <button id="start-wave-btn" class="action-btn" disabled>
          <span id="start-wave-label">Place towers</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Tower info panel (sell / upgrade) -->
  <div id="tower-panel" class="tower-panel hidden" role="dialog" aria-label="Defense module options">
    <div class="tower-panel-inner">
      <div class="tower-panel-header">
        <span id="tp-name"></span>
        <span id="tp-level" class="tp-level"></span>
        <div class="tp-header-spacer"></div>
        <span id="tp-credits" class="tp-credits"></span>
        <button id="tp-close" class="tp-close" aria-label="Close">✕</button>
      </div>
      <div class="tower-panel-stats" id="tp-stats"></div>
      <div class="tower-panel-actions">
        <div class="tp-upgrade-paths" id="tp-upgrade-paths">
          <button id="tp-upgrade-a" class="tp-btn-upgrade"></button>
          <div class="tp-or-divider" id="tp-or-label">or</div>
          <button id="tp-upgrade-b" class="tp-btn-upgrade"></button>
        </div>
        <button id="tp-sell" class="secondary-btn tp-btn-sell"></button>
      </div>
    </div>
  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="modal-card">
      <div id="modal-header"></div>
      <div id="modal-body"></div>
      <div id="modal-actions"></div>
    </div>
  </div>

  <!-- Gold float container -->
  <div id="floats" aria-hidden="true"></div>

  <!-- Tower long-press tooltip -->
  <div id="tower-tooltip" class="tower-tooltip" aria-hidden="true"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
