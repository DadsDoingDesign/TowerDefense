<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#09090f">
  <title>SENTINEL — Perimeter Defense Console</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">

    <!-- Site header — brand identity -->
    <header id="site-header">
      <div id="header-brand">
        <div id="header-logo" aria-hidden="true"></div>
        <div id="header-wordmark">
          <span id="header-title">SENTINEL</span>
          <span id="header-subtitle">Perimeter Defense Console</span>
        </div>
      </div>
      <div id="header-meta">
        <div id="header-status">
          <span class="status-dot" aria-hidden="true"></span>
          <span>OPERATIONAL</span>
        </div>
        <span id="header-version">v2.4.1</span>
      </div>
    </header>

    <!-- Canvas layer -->
    <div id="canvas-container">
      <canvas id="bg-canvas"></canvas>
      <canvas id="game-canvas"></canvas>

      <!-- Floating toast notification -->
      <div id="toast" class="toast" aria-live="polite"></div>
    </div>

    <!-- HUD bar -->
    <div id="ui-bar">
      <div id="stats-row">
        <div class="stat" id="stat-gold">
          <span class="stat-value"><span class="stat-icon gold-icon">◆</span><span id="gold-value">150</span></span>
          <span class="stat-label">Credits</span>
        </div>
        <div class="stat" id="stat-lives">
          <span class="stat-value"><span class="stat-icon lives-icon">♥</span><span id="lives-value">20</span></span>
          <span class="stat-label">Nodes</span>
        </div>
        <div class="stat" id="stat-wave">
          <span class="stat-value">#<span id="wave-value">—</span></span>
          <span class="stat-label">Wave</span>
        </div>
        <div class="stat" id="stat-score">
          <span class="stat-value mono" id="score-value">0</span>
          <span class="stat-label">Score</span>
        </div>
        <div class="stats-spacer"></div>
        <button id="speed-btn" class="speed-btn" title="Toggle game speed" aria-label="Speed: 1×">1×</button>
      </div>

      <!-- Wave preview -->
      <div id="wave-preview-row" class="wave-preview-row hidden">
        <span class="wave-preview-label">Inbound</span>
        <span id="wave-preview-text" class="wave-preview-text"></span>
      </div>

      <div id="tower-strip">
        <button class="tower-btn" data-tower="meta" title="Meta — 50 cr | Data harvester. Always watching.">
          <span class="tower-icon" data-tower="meta"></span>
          <span class="tower-name">Meta</span>
          <span class="tower-cost mono">50 cr</span>
        </button>
        <button class="tower-btn" data-tower="amazon" title="Amazon — 100 cr | Ships area damage.">
          <span class="tower-icon" data-tower="amazon"></span>
          <span class="tower-name">Amazon</span>
          <span class="tower-cost mono">100 cr</span>
        </button>
        <button class="tower-btn" data-tower="uber" title="Uber — 75 cr | Surge pricing enforcer. Slows threats.">
          <span class="tower-icon" data-tower="uber"></span>
          <span class="tower-name">Uber</span>
          <span class="tower-cost mono">75 cr</span>
        </button>
        <button class="tower-btn" data-tower="tesla" title="Tesla — 150 cr | Visionary disruptor. High DPS.">
          <span class="tower-icon" data-tower="tesla"></span>
          <span class="tower-name">Tesla</span>
          <span class="tower-cost mono">150 cr</span>
        </button>

        <div class="strip-spacer"></div>

        <button id="start-wave-btn" class="action-btn" disabled>
          <span id="start-wave-label">Place towers</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Tower info panel (sell / upgrade) -->
  <div id="tower-panel" class="tower-panel hidden" role="dialog" aria-label="Defense module options">
    <div class="tower-panel-inner">
      <div class="tower-panel-header">
        <span id="tp-name"></span>
        <span id="tp-level" class="tp-level"></span>
        <button id="tp-close" class="tp-close" aria-label="Close">✕</button>
      </div>
      <div class="tower-panel-stats" id="tp-stats"></div>
      <div class="tower-panel-actions">
        <div class="tp-upgrade-paths" id="tp-upgrade-paths">
          <button id="tp-upgrade-a" class="action-btn tp-btn-upgrade"></button>
          <button id="tp-upgrade-b" class="secondary-btn tp-btn-upgrade-b"></button>
        </div>
        <button id="tp-sell" class="secondary-btn tp-btn-sell"></button>
      </div>
    </div>
  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="modal-card">
      <div id="modal-header"></div>
      <div id="modal-body"></div>
      <div id="modal-actions"></div>
    </div>
  </div>

  <!-- Gold float container -->
  <div id="floats" aria-hidden="true"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
